<!DOCTYPE html>
<html>

<head>
<title>Rome's Website</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:#0f172a;
overflow-x:hidden;
}

/* particle canvas */

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* navigation */

nav{
background:#020617;
padding:15px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* header */

header{
padding:60px;
background:linear-gradient(135deg,#1d4ed8,#38bdf8);
}

h1{
font-size:40px;
}

/* sections */

section{
padding:40px;
}

/* image */

img{
width:200px;
border-radius:50%;
border:4px solid white;
margin-top:20px;
}

/* buttons */

button{
padding:12px 25px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#16a34a;
}

/* social */

.social a{
display:inline-block;
margin:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<header>

<h1>Welcome to Rome's Website</h1>

<p id="typing"></p>

</header>

<section>

<h2>About Me</h2>

<p>My name is Rome. I'm from Takoradi and I'm learning web development.</p>

<img src="FDSL9164.JPG">

</section>

<section>

<h2>My Goal</h2>

<p>I want to become a great programmer and build amazing tech projects.</p>

<button>Follow My Journey</button>

</section>

<section>

<h2>Connect With Me</h2>

<div class="social">

<a href="#">Instagram</a>

<a href="#">WhatsApp</a>

</div>

</section>

<script>

/* typing effect */

const text = "Future Developer | Building Cool Things 🚀";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

/* particle animation */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
