<!DOCTYPE html>
<html>

<head>
<title>Rome | Developer</title>

<style>

body{
margin:0;
font-family:Arial;
color:#00ff9d;
text-align:center;
background:black;
overflow:hidden;
}

/* matrix canvas */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* navigation */

nav{
background:black;
padding:15px;
border-bottom:1px solid #00ff9d;
}

nav a{
color:#00ff9d;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

/* header */

header{
padding:80px 20px;
}

h1{
font-size:45px;
text-shadow:0 0 15px #00ff9d;
}

/* sections */

section{
padding:40px;
}

/* profile image */

img{
width:200px;
border-radius:50%;
border:3px solid #00ff9d;
margin-top:20px;
box-shadow:0 0 20px #00ff9d;
}

/* buttons */

button{
padding:12px 25px;
background:#00ff9d;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin:10px;
}

button:hover{
background:white;
color:black;
}

/* contact buttons */

.social a{
display:inline-block;
margin:10px;
padding:10px 20px;
background:#00ff9d;
color:black;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<header>

<h1>Rome | Future Developer</h1>

<p id="typing"></p>

</header>

<section>

<h2>About Me</h2>

<p>My name is Rome. I'm from Takoradi and I'm learning programming and web development.</p>

<img src="FDSL9164.JPG">

</section>

<section>

<h2>My Mission</h2>

<p>I want to become a powerful software developer and build amazing tech projects.</p>

<button>Follow My Journey</button>

</section>

<section>

<h2>Contact Me</h2>

<div class="social">

<a href="#">Instagram</a>

<a href="#">WhatsApp</a>

</div>

</section>

<script>

/* typing effect */

const text = "Coding the future... Building my tech empire 🚀";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();

/* matrix effect */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff9d";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text = letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,35);

</script>

</body>

</html>
