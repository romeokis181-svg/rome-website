<!DOCTYPE html>
<html>

<head>
<title>Rome | Developer</title>

<style>

body{
margin:0;
font-family:monospace;
background:black;
color:#00ff9d;
text-align:center;
overflow:hidden;
}

/* canvas background */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* navbar */

nav{
padding:15px;
border-bottom:1px solid #00ff9d;
}

nav a{
color:#00ff9d;
margin:0 20px;
text-decoration:none;
font-weight:bold;
}

/* header */

header{
padding:80px 20px;
}

h1{
font-size:45px;
text-shadow:0 0 15px #00ff9d;
}

/* sections */

section{
padding:40px;
}

/* image */

img{
width:200px;
border-radius:50%;
border:3px solid #00ff9d;
box-shadow:0 0 20px #00ff9d;
}

/* buttons */

button{
padding:12px 25px;
background:#00ff9d;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin:10px;
}

button:hover{
background:white;
color:black;
}

/* chatbot */

#chatbox{
position:fixed;
bottom:20px;
right:20px;
width:250px;
background:black;
border:1px solid #00ff9d;
padding:10px;
}

#messages{
height:120px;
overflow-y:auto;
font-size:12px;
margin-bottom:5px;
}

input{
width:100%;
padding:5px;
background:black;
border:1px solid #00ff9d;
color:#00ff9d;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<header>

<h1>Rome | Future Hacker Developer</h1>

<p id="typing"></p>

<button onclick="playMusic()">Play Music</button>

</header>

<section>

<h2>About Me</h2>

<p>My name is Rome. I'm from Takoradi and I'm learning web development.</p>

<img src="FDSL9164.JPG">

</section>

<section>

<h2>Contact Me</h2>

<a href="https://wa.me/233XXXXXXXXX">
<button>WhatsApp Me</button>
</a>

</section>

<div id="chatbox">

<div id="messages"></div>

<input type="text" id="userInput" placeholder="Ask Rome's AI..." onkeydown="talk(event)">

</div>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* typing text */

const text = "Building the future with code...";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();

/* music */

function playMusic(){
document.getElementById("music").play();
}

/* chatbot */

function talk(e){

if(e.key === "Enter"){

let input = document.getElementById("userInput").value;

let messages = document.getElementById("messages");

messages.innerHTML += "<div>> " + input + "</div>";

let reply = "I'm Rome's AI. Rome is learning coding.";

if(input.toLowerCase().includes("hello"))
reply = "Hello 👋 welcome to Rome's website.";

if(input.toLowerCase().includes("who are you"))
reply = "I'm Rome's website AI assistant.";

messages.innerHTML += "<div>" + reply + "</div>";

document.getElementById("userInput").value="";

}

}

/* matrix background */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff9d";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text = letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,35);

</script>

</body>

</html>
