<!DOCTYPE html>
<html>

<head>
<title>Rome's Website</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* Navigation bar */

nav{
background:#020617;
padding:15px;
position:sticky;
top:0;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

/* Header */

header{
padding:60px;
background:linear-gradient(135deg,#1d4ed8,#38bdf8);
}

h1{
font-size:40px;
}

/* Sections */

section{
padding:40px;
}

/* Image */

img{
width:200px;
border-radius:50%;
border:4px solid white;
margin-top:20px;
}

/* Buttons */

button{
padding:12px 25px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#16a34a;
}

/* Social links */

.social a{
display:inline-block;
margin:10px;
padding:10px 20px;
background:#2563eb;
color:white;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<header>

<h1>Welcome to Rome's Website</h1>

<p id="typing"></p>

</header>

<section>

<h2>About Me</h2>

<p>My name is Rome. I'm learning web development and building cool things.</p>

<img src="FDSL9164.JPG">

</section>

<section>

<h2>My Goal</h2>

<p>I want to become a great programmer and build amazing projects.</p>

<button>Follow My Journey</button>

</section>

<section>

<h2>Connect With Me</h2>

<div class="social">

<a href="#">Instagram</a>

<a href="#">WhatsApp</a>

</div>

</section>

<script>

/* typing animation */

const text = "Future Developer | Building Cool Things 🚀";
let i = 0;

function typing(){
if(i < text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

</script>

</body>
</html>
